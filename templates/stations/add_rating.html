{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm">
            <div class="card-teal-header">
                <i class="bi bi-star"></i> {% if existing_rating %}Edit{% else %}Add{% endif %} Rating for {{ station.name }}
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label"><i class="bi bi-star-fill text-warning"></i> Your Rating</label>
                        {{ form.rating }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label"><i class="bi bi-chat"></i> Your Review</label>
                        {{ form.comment }}
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-teal">
                            <i class="bi bi-save"></i> Save Rating
                        </button>
                        <a href="{% url 'stations:station_detail' station.id %}" class="btn btn-secondary">
                            <i class="bi bi-arrow-left"></i> Back
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
