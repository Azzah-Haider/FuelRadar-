{% extends 'base.html' %}
{% block content %}
<div class="card">
    <div class="card-header">
        <i class="fas fa-clock"></i>Stations Awaiting Approval
    </div>
    <div class="card-body p-4">
        {% for station in stations %}
            <div class="d-flex justify-content-between align-items-center mb-3 pb-3 border-bottom">
                <div>
                    <strong>{{ station.name }}</strong> — {{ station.city }}
                    <br>
                    <small class="text-muted">Manager: {{ station.manager.username }}</small>
                </div>
                <div>
                    <a href="{% url 'stations:approve_station' station.pk %}" class="btn btn-success">
                        <i class="fas fa-check"></i> Approve
                    </a>
                    <a href="{% url 'stations:admin_delete_station' station.pk %}" class="btn btn-danger">
                        <i class="fas fa-trash"></i> Reject
                    </a>
                </div>
            </div>
        {% empty %}
            <p class="text-muted">No stations awaiting approval.</p>
        {% endfor %}
    </div>
</div>
{% endblock %}
