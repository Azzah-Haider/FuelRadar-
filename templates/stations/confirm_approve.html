{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <i class="fas fa-check-circle"></i>Approve Station
            </div>
            <div class="card-body p-4">
                <p>Approve <strong>{{ station.name }}</strong> ({{ station.city }})?</p>
                <p class="text-muted">Manager: {{ station.manager.username }}</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-success">
                        <i class="fas fa-check"></i> Yes, Approve
                    </button>
                    <a href="{% url 'stations:pending_stations' %}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
