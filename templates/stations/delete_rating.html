{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-danger text-white">
                <i class="bi bi-exclamation-triangle"></i> Delete Rating
            </div>
            <div class="card-body">
                <p>Are you sure you want to delete your rating for <strong>"{{ rating.station.name }}"</strong>?</p>
                <p class="text-danger">This action cannot be undone!</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-delete">
                            <i class="bi bi-trash"></i> Yes, Delete
                        </button>
                        <a href="{% url 'stations:station_detail' rating.station.id %}" class="btn btn-secondary">
                            <i class="bi bi-x-circle"></i> Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
