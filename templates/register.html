{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center" style="min-height: 60vh; align-items: center;">
    <div class="col-md-6">
        <div class="card border-0 shadow-lg">
            <div class="card-teal-header text-center">
                <i class="bi bi-person-plus" style="font-size: 1.5rem;"></i> Create Account
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-teal w-100">
                        <i class="bi bi-person-plus"></i> Sign Up
                    </button>
                </form>
                <p class="text-center mt-4 mb-0">
                    Already have an account? <a href="{% url 'login' %}" class="fw-bold text-teal">Login</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
